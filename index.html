<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, 
          maximum-scale=1, user-scalable=0" />
    <title>Open Budget Captcha</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            text-align: center;
            background: var(--tg-theme-bg-color, #f0f2f5);
            color: var(--tg-theme-text-color, #000);
            padding: 12px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 15px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h3 { font-size: 15px; margin-bottom: 12px; color: #007791; }
        .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            text-align: left;
        }
        .img-a-wrapper {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            display: inline-block;
            margin-bottom: 14px;
        }
        #captcha-a { height: 50px; display: block; }

        /* Rasm B - bosiladigan asosiy rasm */
        .img-b-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            border: 2px solid #007791;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair;
        }
        #captcha-b {
            width: 100%;
            display: block;
            /* Bosish uchun pointer events aktiv */
        }

        /* Bosgan nuqtani ko'rsatuvchi marker */
        .click-marker {
            position: absolute;
            width: 36px;
            height: 36px;
            border: 3px solid #00e676;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse 0.3s ease-out;
        }
        @keyframes pulse {
            0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1);   opacity: 1;   }
        }

        /* Taymer */
        .timer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }
        .timer-text { font-size: 16px; font-weight: bold; color: #007791; }
        .timer-text.urgent { color: #e53935; }
        .progress-container {
            flex: 1;
            margin-left: 10px;
            background: #eee;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-bar {
            width: 100%;
            height: 100%;
            background: #007791;
            transition: width 1s linear;
            border-radius: 4px;
        }

        /* Loading holati */
        .loading {
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 4px solid #eee;
            border-top-color: #007791;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Xato holati */
        .error-box {
            background: #fdecea;
            border: 1px solid #e57373;
            border-radius: 8px;
            padding: 14px;
            color: #c62828;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="card" id="main-card">

    <!-- Loading -->
    <div class="loading" id="loading-view">
        <div class="spinner"></div>
        Rasmlar yuklanmoqda...
    </div>

    <!-- Xato -->
    <div class="error-box" id="error-view">
        ❌ Rasmlarni yuklab bo'lmadi.<br>Botga qaytib qaytadan urinib ko'ring.
    </div>

    <!-- Asosiy kontent -->
    <div id="captcha-view" style
