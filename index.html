<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Open Budget Captcha</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .img-container { position: relative; display: inline-block; margin-top: 15px; border: 2px solid #007791; border-radius: 10px; overflow: hidden; }
        #captcha-b { width: 100%; max-width: 350px; display: block; cursor: crosshair; }
        .timer { font-size: 18px; font-weight: bold; color: #007791; margin: 10px 0; }
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; }
        #progress-bar { width: 100%; height: 100%; background: #007791; transition: width 0.5s linear; }
    </style>
</head>
<body>
    <div class="card">
        <div>Расм <b>A</b></div>
        <img id="captcha-a" src="" height="50">
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <div>Раsm <b>Б</b></div>
        <div class="img-container">
            <img id="captcha-b" src="" onclick="handleClick(event)">
        </div>
        <div class="timer">Qolgan vaqt: <span id="time">30</span>s</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.hash.substring(1));
        document.getElementById('captcha-a').src = params.get('a');
        document.getElementById('captcha-b').src = params.get('b');
        const start = parseInt(params.get('start'));

        function handleClick(e) {
            const img = e.target;
            const rect = img.getBoundingClientRect();
            // Asl o'lchamga nisbatan koordinatani hisoblash
            const x = Math.round((e.clientX - rect.left) * (img.naturalWidth / img.width));
            const y = Math.round((e.clientY - rect.top) * (img.naturalHeight / img.height));
            tg.sendData(JSON.stringify({ id: `${x}${y}`, x: x, y: y }));
            tg.close();
        }

        setInterval(() => {
            const left = 30 - (Math.floor(Date.now() / 1000) - start);
            if (left <= 0) { 
                document.getElementById('time').innerText = "0";
                tg.close(); 
            } else {
                document.getElementById('time').innerText = left;
                document.getElementById('progress-bar').style.width = (left / 30 * 100) + "%";
            }
        }, 500);
    </script>
</body>
</html>
