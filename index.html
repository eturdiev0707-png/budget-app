<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Open Budget Captcha</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .img-container { position: relative; display: inline-block; margin-top: 15px; border: 2px solid #007791; border-radius: 10px; overflow: hidden; }
        #captcha-b { width: 100%; max-width: 350px; display: block; cursor: crosshair; }
        .timer { font-size: 18px; font-weight: bold; color: #007791; margin: 10px 0; }
        .progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; }
        #progress-bar { width: 100%; height: 100%; background: #007791; transition: width 1s linear; }
        .label { font-size: 14px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">Расм <b>A</b> (Target)</div>
        <img id="captcha-a" src="" height="50" style="border: 1px solid #ddd; padding: 5px; border-radius: 5px;">
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <div class="label">Раsm <b>Б</b> (Shu yerdan toping va bosing)</div>
        <div class="img-container">
            <img id="captcha-b" src="" onclick="handleClick(event)">
        </div>
        <div class="timer">Vaqt: <span id="time">30</span>s</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Botdan kelgan Base64 rasmlarni URL fragmentdan o'qiymiz
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        document.getElementById('captcha-a').src = "data:image/png;base64," + params.get('a');
        document.getElementById('captcha-b').src = "data:image/png;base64," + params.get('b');

        function handleClick(e) {
            const img = e.target;
            const rect = img.getBoundingClientRect();
            
            // Koordinatani rasmning asl o'lchamiga nisbatan hisoblash.html]
            const x = Math.round((e.clientX - rect.left) * (img.naturalWidth / img.width));
            const y = Math.round((e.clientY - rect.top) * (img.naturalHeight / img.height));

            const point = { id: `${x}${y}`, x: x, y: y };
            tg.sendData(JSON.stringify(point)); // Botga yuborish
            tg.close();
        }

        // 30 soniyalik taymer.html]
        let timeLeft = 30;
        const interval = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            document.getElementById('progress-bar').style.width = (timeLeft / 30 * 100) + "%";
            if (timeLeft <= 0) { clearInterval(interval); tg.close(); }
        }, 1000);
    </script>
</body>
</html>
