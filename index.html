<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, 
          maximum-scale=1, user-scalable=0" />
    <title>Open Budget Captcha</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            text-align: center;
            background: var(--tg-theme-bg-color, #f0f2f5);
            color: var(--tg-theme-text-color, #000);
            padding: 12px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 15px;
            padding: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h3 { font-size: 15px; margin-bottom: 12px; color: #007791; }
        .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            text-align: left;
        }
        .img-a-wrapper {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            display: inline-block;
            margin-bottom: 14px;
        }
        #captcha-a { height: 50px; display: block; }

        /* Rasm B - bosiladigan asosiy rasm */
        .img-b-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            border: 2px solid #007791;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair;
        }
        #captcha-b {
            width: 100%;
            display: block;
            /* Bosish uchun pointer events aktiv */
        }

        /* Bosgan nuqtani ko'rsatuvchi marker */
        .click-marker {
            position: absolute;
            width: 36px;
            height: 36px;
            border: 3px solid #00e676;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse 0.3s ease-out;
        }
        @keyframes pulse {
            0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1);   opacity: 1;   }
        }

        /* Taymer */
        .timer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
        }
        .timer-text { font-size: 16px; font-weight: bold; color: #007791; }
        .timer-text.urgent { color: #e53935; }
        .progress-container {
            flex: 1;
            margin-left: 10px;
            background: #eee;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-bar {
            width: 100%;
            height: 100%;
            background: #007791;
            transition: width 1s linear;
            border-radius: 4px;
        }

        /* Loading holati */
        .loading {
            padding: 40px;
            color: #999;
            font-size: 14px;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 4px solid #eee;
            border-top-color: #007791;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Xato holati */
        .error-box {
            background: #fdecea;
            border: 1px solid #e57373;
            border-radius: 8px;
            padding: 14px;
            color: #c62828;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="card" id="main-card">

    <!-- Loading -->
    <div class="loading" id="loading-view">
        <div class="spinner"></div>
        Rasmlar yuklanmoqda...
    </div>

    <!-- Xato -->
    <div class="error-box" id="error-view">
        ❌ Rasmlarni yuklab bo'lmadi.<br>Botga qaytib qaytadan urinib ko'ring.
    </div>

    <!-- Asosiy kontent -->
    <div id="captcha-view" style="display:none">

        <h3>🔐 Rasmdagi harfni toping</h3>

        <!-- Rasm A -->
        <div class="label">Rasim <b>A</b> — Shu harfni qidiring:</div>
        <div class="img-a-wrapper">
            <img id="captcha-a" src="" alt="Target harf">
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin: 12px 0;">

        <!-- Rasm B -->
        <div class="label">Rasim <b>B</b> — Shu yerdan bosing:</div>
        <div class="img-b-wrapper" id="img-b-wrapper">
            <img id="captcha-b" src="" alt="Captcha rasm">
        </div>

        <!-- Taymer -->
        <div class="timer-row">
            <span class="timer-text" id="timer-text">⏱ 30s</span>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>

    </div>
</div>

<script>
    // ================================================
    // Telegram WebApp initsializatsiya
    // ================================================
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ================================================
    // URL fragmentdan rasmlarni olish
    // Bot main.py da:
    //   full_url = f"{MINI_APP_URL}#a={data['a']}&b={data['b']}"
    // ================================================
    function loadImages() {
        const hash = window.location.hash.substring(1); // '#' ni olib tashlash

        // Fragment bo'sh bo'lsa
        if (!hash || hash.length < 10) {
            showError("URL da rasm ma'lumoti topilmadi.");
            return;
        }

        // URLSearchParams fragment uchun ham ishlaydi
        const params = new URLSearchParams(hash);
        const imgA = params.get('a');
        const imgB = params.get('b');

        if (!imgA || !imgB) {
            showError("Rasm parametrlari topilmadi (a yoki b yo'q).");
            return;
        }

        const captchaA = document.getElementById('captcha-a');
        const captchaB = document.getElementById('captcha-b');

        // Rasm B yuklanganda ko'rsatamiz
        captchaB.onload = () => {
            document.getElementById('loading-view').style.display  = 'none';
            document.getElementById('captcha-view').style.display  = 'block';
            startTimer();
        };

        captchaB.onerror = () => {
            showError("Rasm yuklashda xato yuz berdi.");
        };

        // Base64 rasmlarni o'rnatish
        captchaA.src = "data:image/png;base64," + imgA;
        captchaB.src = "data:image/png;base64," + imgB;
    }

    // ================================================
    // Bosish hodisasi — koordinatani hisoblash
    // ================================================
    let clicked = false; // Ikki marta bosilmasligi uchun

    document.getElementById('img-b-wrapper').addEventListener('click', function(e) {
        if (clicked) return;

        const img    = document.getElementById('captcha-b');
        const rect   = img.getBoundingClientRect();

        // Koordinatani rasmning ASAL o'lchamiga nisbatan hisoblash
        // (rasm ekranda kichraygan bo'lishi mumkin)
        const scaleX = img.naturalWidth  / rect.width;
        const scaleY = img.naturalHeight / rect.height;

        const x = Math.round((e.clientX - rect.left) * scaleX);
        const y = Math.round((e.clientY - rect.top)  * scaleY);

        // Vizual marker ko'rsatish
        showClickMarker(e.clientX - rect.left, e.clientY - rect.top);

        clicked = true; // Qayta bosilmasin

        // Botga yuborish
        const point = { id: `${x}${y}`, x: x, y: y };

        console.log("Yuborilayotgan koordinata:", point);

        // Kichik kechikish — marker ko'rinsin
        setTimeout(() => {
            tg.sendData(JSON.stringify(point));
            tg.close();
        }, 400);
    });

    // ================================================
    // Bosgan joyga yashil doira ko'rsatish
    // ================================================
    function showClickMarker(left, top) {
        const wrapper = document.getElementById('img-b-wrapper');

        // Eski markerni olib tashlash
        const old = wrapper.querySelector('.click-marker');
        if (old) old.remove();

        const marker = document.createElement('div');
        marker.className = 'click-marker';
        marker.style.left = left + 'px';
        marker.style.top  = top  + 'px';
        wrapper.appendChild(marker);
    }

    // ================================================
    // 30 soniyalik taymer
    // ================================================
    function startTimer() {
        let timeLeft = 30;
        const timerText = document.getElementById('timer-text');
        const progressBar = document.getElementById('progress-bar');

        const interval = setInterval(() => {
            timeLeft--;
            timerText.innerText = `⏱ ${timeLeft}s`;
            progressBar.style.width = (timeLeft / 30 * 100) + '%';

            // 10 soniya qolganda qizil rang
            if (timeLeft <= 10) {
                timerText.classList.add('urgent');
                progressBar.style.background = '#e53935';
            }

            if (timeLeft <= 0) {
                clearInterval(interval);
                tg.close(); // Vaqt tugadi
            }
        }, 1000);
    }

    // ================================================
    // Xato ko'rsatish
    // ================================================
    function showError(msg) {
        document.getElementById('loading-view').style.display = 'none';
        const errorBox = document.getElementById('error-view');
        errorBox.style.display = 'block';
        errorBox.innerHTML = `❌ ${msg}<br><small>Botga qaytib <b>/start</b> deb yozing.</small>`;
    }

    // ================================================
    // Sahifa yuklanganda ishga tushirish
    // ================================================
    loadImages();
</script>

</body>
</html>
